<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly-Nexus Terminal</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-orange: #d29922;
            --accent-gold: #e3b341;
            --accent-blue: #58a6ff;
            --border: #30363d;
            --tooltip-bg: #2d333b;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .live-dot {
            width: 10px; height: 10px; background: var(--accent-green);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .status-badge { font-size: 0.8rem; background: var(--card-bg); padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); }
        .market-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 6px; overflow: visible; font-size: 0.9rem; }
        th, td { text-align: left; padding: 12px 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { background-color: #21262d; color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; }
        tr:hover { background-color: #21262d; }
        
        .info-icon { display: inline-block; margin-left: 4px; cursor: default; color: var(--accent-blue); font-size: 12px; position: relative; vertical-align: 1px; opacity: 0.8; transition: opacity 0.2s; }
        .info-icon:hover { opacity: 1; }
        .info-icon:hover::after { content: attr(data-tooltip); position: absolute; bottom: 160%; left: 50%; transform: translateX(-50%); background: var(--tooltip-bg); color: #fff; padding: 10px 14px; border-radius: 6px; font-size: 0.75rem; line-height: 1.5; white-space: pre-wrap; width: 240px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 1px solid var(--border); z-index: 1000; text-align: left; text-transform: none; font-weight: normal; }
        .info-icon:hover::before { content: ''; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); border-width: 6px; border-style: solid; border-color: var(--tooltip-bg) transparent transparent transparent; z-index: 1000; }

        .price { font-weight: bold; color: #fff; font-size: 1.1rem; }
        .change-pos { color: var(--accent-green); }
        .change-neg { color: var(--accent-red); }
        .loading { text-align: center; padding: 50px; color: var(--text-muted); }
        .sparkline-container { width: 120px; height: 40px; }
        path { fill: none; stroke-width: 2; vector-effect: non-scaling-stroke; }
        
        .beta-val { font-weight: bold; }
        .beta-high { color: var(--accent-orange); } 
        .beta-low { color: var(--text-muted); }
        
        .score-val { font-weight: bold; font-size: 1.0rem; }
        .score-high { color: var(--accent-gold); text-shadow: 0 0 5px rgba(227, 179, 65, 0.3); }
        .score-mid { color: var(--text-main); }
        .score-low { color: var(--text-muted); }
        
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; border: 1px solid transparent; }
        
        /* 색상 정의 */
        .tag-hot { background: rgba(248, 81, 73, 0.2); color: #f85149; border-color: rgba(248, 81, 73, 0.4); } /* 빨강 */
        .tag-orange { background: rgba(210, 153, 34, 0.2); color: #d29922; border-color: rgba(210, 153, 34, 0.4); } /* 주황 */
        .tag-gold { background: rgba(227, 179, 65, 0.2); color: #e3b341; border-color: rgba(227, 179, 65, 0.4); } /* 금색 */
        .tag-good { background: rgba(63, 185, 80, 0.2); color: #3fb950; border-color: rgba(63, 185, 80, 0.4); } /* 초록 */
        .tag-wait { background: rgba(139, 148, 158, 0.2); color: #8b949e; border-color: rgba(139, 148, 158, 0.4); } /* 회색 */
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1><div class="live-dot"></div> Poly-Nexus Terminal</h1>
            <small style="color: var(--text-muted);">Institutional Grade Market Intelligence</small>
        </div>
        <div class="status-badge" id="last-updated">Syncing...</div>
    </header>
    <div id="app"><div class="loading">📡 Connecting to Satellite Feed...</div></div>
</div>
<script>
    async function fetchIntelligence() {
        try {
            const response = await fetch('./data/latest_intelligence.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error("Data fetch failed");
            const data = await response.json();
            renderTable(data);
            
            if (data.length > 0) {
                const serverTime = new Date(data[0].last_updated);
                const timeOptions = { 
                    year: 'numeric', month: 'short', day: 'numeric', 
                    hour: '2-digit', minute: '2-digit', second: '2-digit',
                    hour12: false, timeZoneName: 'shortOffset'
                };
                const timeString = serverTime.toLocaleString('en-US', timeOptions);
                document.getElementById('last-updated').innerText = `Last Sync: ${timeString}`;
            }
        } catch (error) {
            document.getElementById('app').innerHTML = `<div class="loading" style="color: var(--accent-red)">❌ System Offline: ${error.message}</div>`;
        }
    }

    function createSparkline(dataPoints, isPositive) {
        if (!dataPoints || dataPoints.length < 2) return '';
        const width = 120; const height = 40;
        const prices = dataPoints.map(d => d.p);
        const min = Math.min(...prices); const max = Math.max(...prices);
        const range = max - min || 1;
        let pathD = "";
        prices.forEach((p, i) => {
            const x = (i / (prices.length - 1)) * width;
            const y = height - ((p - min) / range) * height;
            pathD += `${i === 0 ? 'M' : 'L'} ${x} ${y} `;
        });
        const color = isPositive ? 'var(--accent-green)' : 'var(--accent-red)';
        return `<svg class="sparkline-container" viewBox="0 0 ${width} ${height}"><path d="${pathD}" stroke="${color}" /></svg>`;
    }

    function renderTable(markets) {
        let html = `
            <table class="market-table">
                <thead>
                    <tr>
                        <th style="width: 30%">Market</th>
                        <th style="width: 10%">Price</th>
                        <th style="width: 10%">Trend (4H)</th>
                        <th style="width: 10%" data-tooltip="Total Trading Volume (USDC)">Volume</th>
                        <th style="width: 10%">
                            Beta (BTC)
                            <span class="info-icon" data-tooltip="Correlation with Bitcoin price.&#10;• > 0.5: Highly correlated (Follows BTC)&#10;• < 0: Inverse correlation">ⓘ</span>
                        </th>
                        <th style="width: 10%">
                            Nexus Score
                            <span class="info-icon" data-tooltip="Structural Integrity Score (0-100).&#10;Based on Liquidity Depth, Spread tightness, and Volatility decay.&#10;Higher is better.">ⓘ</span>
                        </th>
                        <th style="width: 20%">
                            Status
                            <span class="info-icon" data-tooltip="Current Market Regime.&#10;• Solid: Safe & Deep&#10;• Fragile: Low liquidity / Risky&#10;• Coupled: Moving with Crypto">ⓘ</span>
                        </th>
                    </tr>
                </thead>
                <tbody>
        `;

        markets.forEach(m => {
            const volDisplay = (m.volume && m.volume > 0) ? '$' + parseInt(m.volume).toLocaleString() : '-';
            const changeClass = m.change_since_start >= 0 ? 'change-pos' : 'change-neg';
            const changeSign = m.change_since_start >= 0 ? '+' : '';
            const isPositive = m.change_since_start >= 0;
            
            let betaDisplay = '-';
            let betaClass = 'beta-low';
            if (m.beta !== undefined) {
                betaDisplay = m.beta.toFixed(2);
                if (Math.abs(m.beta) > 0.5) betaClass = 'beta-high';
            }
            
            let scoreDisplay = '-';
            let scoreClass = 'score-low';
            if (m.nexus_score !== undefined) {
                scoreDisplay = m.nexus_score;
                if (m.nexus_score >= 80) scoreClass = 'score-high';
                else if (m.nexus_score >= 50) scoreClass = 'score-mid';
            }

            // [아이콘 및 색상 로직]
            let statusText = m.market_state || "Initializing";
            let badgeClass = "tag-wait"; 
            let icon = ""; // 기본 아이콘 없음

            // 1. Fragile (가장 위험, 최우선)
            if (statusText.includes("Fragile") || statusText.includes("Volatile")) {
                badgeClass = "tag-hot"; // 빨강
                icon = "🔥 ";
                // Fragile하면서 Coupled면 아이콘 두 개 표시
                if (statusText.includes("Coupled")) {
                    icon = "🔥🔗 ";
                }
            } 
            // 2. Coupled (중간 위험)
            else if (statusText.includes("Coupled")) {
                badgeClass = "tag-orange"; // 주황
                icon = "🔗 ";
            } 
            // 3. Solid / Stable (안전)
            else if (statusText.includes("Solid") || statusText.includes("Consolidated")) {
                badgeClass = "tag-gold"; // 금색
                icon = "🛡️ ";
            } else if (statusText.includes("Stable") || statusText.includes("Static")) {
                badgeClass = "tag-good"; // 초록
                icon = "⚖️ ";
            }

            let statusBadge = `<span class="tag ${badgeClass}">${icon}${statusText}</span>`;

            html += `
                <tr>
                    <td>
                        <div style="font-weight: 600; font-size: 0.95rem; margin-bottom: 4px;">${m.question}</div>
                        <small style="color: var(--text-muted)">ID: ${m.id}</small>
                    </td>
                    <td>
                        <div class="price">${(m.current_price * 100).toFixed(1)}¢</div>
                        <small class="${changeClass}">${changeSign}${m.change_since_start}%</small>
                    </td>
                    <td>${createSparkline(m.sparkline, isPositive)}</td>
                    <td style="color: var(--text-muted);">${volDisplay}</td>
                    <td><span class="beta-val ${betaClass}">${betaDisplay}</span></td>
                    <td><span class="score-val ${scoreClass}">${scoreDisplay}</span></td>
                    <td>${statusBadge}</td>
                </tr>
            `;
        });
        html += `</tbody></table>`;
        document.getElementById('app').innerHTML = html;
    }
    fetchIntelligence();
    setInterval(fetchIntelligence, 60000);
</script>
</body>
</html>
