name: 1. Calculate & Analyze

on:
  repository_dispatch:
    types: [poly-nexus-run]
  workflow_dispatch:

# ── [C-1 FIX] 중복 트리거 방지 ──────────────────────────────────
concurrency:
  group: poly-nexus-fetch
  cancel-in-progress: true
# ─────────────────────────────────────────────────────────────────

jobs:
  calculate:
    runs-on: ubuntu-latest
    # [P2-2 FIX] timeout 추가
    # 기존: timeout-minutes 미설정 → GitHub Actions 기본 6시간
    # 문제: CLOB API hang, Polymarket API 무응답 시 6시간 점유
    #       concurrency cancel-in-progress: true 설정이 있으나,
    #       해당 run이 완료되지 않으면 다음 트리거가 취소됨 → 파이프라인 공백
    # 수정: 25분 (30분 cadence 기준 여유 5분)
    #       파이프라인 정상 실행 시간이 25분 초과하면 이 값을 올릴 것
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Private Brain
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.TOKEN1 }}
          path: private-brain

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('private-brain/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Libraries
        run: pip install -r private-brain/requirements.txt

      - name: Run Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          cd private-brain
          python main.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: nexus-data
          path: private-brain/data_output/
          retention-days: 1