name: 2. Convergence Resolver (Daily)

on:
  schedule:
    # 6시간마다 실행 (idempotent - 중복 실행 안전)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Private Brain
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.TOKEN1 }}
          path: private-brain

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('private-brain/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Libraries
        run: pip install -r private-brain/requirements.txt

      - name: Run Convergence Resolver
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd private-brain
          python src/convergence_resolver.py