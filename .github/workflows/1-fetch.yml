name: 1. Calculate & Analyze

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다 (무료)
  workflow_dispatch:

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: read # [중요] 읽기 전용!

    steps:
      # 1. Private Brain (뇌) 빌려오기
      - name: Checkout Private Brain
        uses: actions/checkout@v4
        with:
          repository: jenadoe/poly-core # [본인 ID 확인]
          token: ${{ secrets.PAT_TOKEN }}
          path: private-brain

      # 2. 파이썬 세팅
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r private-brain/requirements.txt

      # 3. 엔진 가동
      # 결과는 private-brain/data_output/ 안에 생성됨
      - name: Run Engine
        run: |
          cd private-brain
          python main.py

      # 4. 결과물 포장 (Artifact 업로드)
      # history_storage.json과 latest_intelligence.json을 묶어서 올림
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: nexus-data
          path: private-brain/data_output/
          retention-days: 1