name: 2. Distribute & Commit

on:
  workflow_run:
    workflows: ["1. Calculate & Analyze"]
    types:
      - completed

# ── [C-1 FIX] push conflict 방지 ────────────────────────────────
concurrency:
  group: poly-nexus-commit
  cancel-in-progress: false
# ─────────────────────────────────────────────────────────────────

jobs:
  distribute:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download Data
        uses: actions/download-artifact@v4
        with:
          name: nexus-data
          path: temp_data
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------
      # [Mission 1] Private Repo 업데이트 (poly-core)
      # ---------------------------------------------------
      - name: Checkout Private Brain
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.TOKEN1 }}
          path: private-brain

      - name: Push Assets to Private
        run: |
          cd private-brain

          mkdir -p data_output/api/v1/events
          mkdir -p data_output/audit_logs

          echo "📂 Copying Data Assets..."

          if [ -f ../temp_data/active_events.json ]; then
            cp -f ../temp_data/active_events.json data_output/
          fi

          if [ -d ../temp_data/api ]; then
            rm -rf data_output/api/
            cp -rf ../temp_data/api data_output/
          fi

          if [ -d ../temp_data/audit_logs ]; then
            cp -rf ../temp_data/audit_logs/* data_output/audit_logs/ || true
          fi

          if [ -f ../temp_data/regime_changes.json ]; then
            cp -f ../temp_data/regime_changes.json data_output/
          fi

          if [ -f ../temp_data/completed_ids.json ]; then
            cp -f ../temp_data/completed_ids.json data_output/
          fi

          if [ -f data_output/active_markets.json ]; then rm data_output/active_markets.json; fi
          if [ -f data_output/history_storage.json ]; then rm data_output/history_storage.json; fi

          git config --global user.name "Poly-Nexus Bot"
          git config --global user.email "bot@polynexus.com"
          git add data_output/

          if git diff --staged --quiet; then
            echo "✅ No private changes."
          else
            git commit -m "🧠 Update Data Assets & Audit [$(date)]"
            git pull --rebase -X theirs origin main
            git push
          fi

      # ---------------------------------------------------
      # [Mission 2] Public Repo 업데이트 (poly-terminal)
      # ---------------------------------------------------
      - name: Checkout Public Face
        uses: actions/checkout@v4
        with:
          path: public-face

      - name: Push Intelligence to Public
        run: |
          cd public-face
          mkdir -p docs/data

          if [ -f ../temp_data/latest_intelligence.json ]; then
            cp -f ../temp_data/latest_intelligence.json docs/data/
          fi

          if [ -f ../temp_data/regime_changes.json ]; then
            cp -f ../temp_data/regime_changes.json docs/data/
          fi

          # [보안] 민감 폴더 삭제 (Public에는 절대 노출 금지)
          if [ -d docs/data/api ]; then rm -rf docs/data/api; fi
          if [ -d docs/data/audit_logs ]; then rm -rf docs/data/audit_logs; fi
          if [ -d docs/data/archive ]; then rm -rf docs/data/archive; fi
          if [ -d docs/data/completed_events ]; then rm -rf docs/data/completed_events; fi

          # [KEY FIX] Supabase 키를 config.js로 주입 — index.html에 직접 sed하지 않음
          # config.js는 .gitignore에 등록되어 git에 절대 올라가지 않음
          # GitHub Pages 서빙 시에는 이 파일이 존재하므로 대시보드 정상 작동
          # index.html은 항상 키 없는 깨끗한 상태로 repo에 유지됨
          cat > docs/data/config.js << 'CONFIG_EOF'
// AUTO-GENERATED BY CI — DO NOT COMMIT
// .gitignore에 등록되어 있으므로 git에 올라가지 않습니다.
window.POLY_NEXUS_CONFIG = {
  supabaseUrl:     '${{ secrets.SUPABASE_URL }}',
  supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}'
};
CONFIG_EOF

          git config --global user.name "Poly-Nexus Bot"
          git config --global user.email "bot@polynexus.com"

          # config.js는 .gitignore에 의해 git add 대상에서 자동 제외됨
          # → 키가 절대 commit되지 않음
          git add docs/

          if git diff --staged --quiet; then
            echo "✅ No public changes."
          else
            git commit -m "📢 Update Dashboard [$(date)]"
            git pull --rebase -X theirs origin main
            git push
          fi