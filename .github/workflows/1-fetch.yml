name: 1. Calculate & Analyze

on:
  repository_dispatch:
    types: [poly-nexus-run]  # Cloudflare Workers가 보내는 신호
  workflow_dispatch:  # 수동 실행도 유지

# ── [C-1 FIX] 중복 트리거 방지 ──────────────────────────────────
# cancel-in-progress: true → 30분 내 중복 트리거 시 대기 중인 것 취소
# 이미 실행 중인 job은 끝까지 완료, 그 다음 트리거는 버림
# 2-commit과 group 분리 → 불필요한 2번째 사이클 방지
concurrency:
  group: poly-nexus-fetch
  cancel-in-progress: true
# ─────────────────────────────────────────────────────────────────

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Private Brain
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.TOKEN1 }}
          path: private-brain

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # [PIP CACHE] 2-resolve.yml과 동일한 방식 — 30분마다 실행되는 파이프라인에서
      # scipy/pandas/numpy 매번 풀 설치 방지 (약 60~90초/회 절감)
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('private-brain/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Libraries
        run: pip install -r private-brain/requirements.txt

      - name: Run Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          cd private-brain
          python main.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: nexus-data
          path: private-brain/data_output/
          retention-days: 1