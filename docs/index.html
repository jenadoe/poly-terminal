<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly-Nexus Terminal</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --border: #30363d;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Consolas', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px; /* 차트 들어가서 넓힘 */
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .live-dot {
            width: 10px; height: 10px; background: var(--accent-red);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent-red);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .status-badge {
            font-size: 0.8rem;
            background: var(--card-bg);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        
        /* 테이블 스타일 */
        .market-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            font-size: 0.9rem;
        }
        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        th {
            background-color: #21262d;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        tr:hover { background-color: #21262d; }
        
        .price { font-weight: bold; color: #fff; font-size: 1.1rem; }
        .change-pos { color: var(--accent-green); }
        .change-neg { color: var(--accent-red); }
        
        .loading { text-align: center; padding: 50px; color: var(--text-muted); }
        
        /* 차트 영역 */
        .sparkline-container {
            width: 120px;
            height: 40px;
        }
        path {
            fill: none;
            stroke-width: 2;
            vector-effect: non-scaling-stroke;
        }

        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .tag-hot { background: rgba(248, 81, 73, 0.2); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.4); }
        .tag-wait { background: rgba(139, 148, 158, 0.2); color: #8b949e; border: 1px solid rgba(139, 148, 158, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1><div class="live-dot"></div> Poly-Nexus Terminal</h1>
            <small style="color: var(--text-muted);">Real-time Market Intelligence Dashboard</small>
        </div>
        <div class="status-badge" id="last-updated">
            Syncing...
        </div>
    </header>

    <div id="app">
        <div class="loading">📡 Connecting to Satellite Feed...</div>
    </div>
</div>

<script>
    async function fetchIntelligence() {
        try {
            // 캐시 방지를 위해 timestamp 추가
            const response = await fetch('./data/latest_intelligence.json?t=' + new Date().getTime());
            
            if (!response.ok) throw new Error("Data fetch failed");
            
            const data = await response.json();
            renderTable(data);
            
            if (data.length > 0) {
                const lastTime = new Date(data[0].last_updated).toLocaleString();
                document.getElementById('last-updated').innerText = `Last Sync: ${lastTime}`;
            }
            
        } catch (error) {
            document.getElementById('app').innerHTML = `
                <div class="loading" style="color: var(--accent-red)">
                    ❌ System Offline: ${error.message}<br>
                    (데이터가 아직 생성되지 않았을 수 있습니다.)
                </div>
            `;
        }
    }

    // 미니 차트(SVG) 생성 함수
    function createSparkline(dataPoints, isPositive) {
        if (!dataPoints || dataPoints.length < 2) return '';

        const width = 120;
        const height = 40;
        
        // 가격 데이터만 추출
        const prices = dataPoints.map(d => d.p);
        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const range = max - min || 1; // 0 나누기 방지

        // 좌표 계산
        let pathD = "";
        prices.forEach((p, i) => {
            const x = (i / (prices.length - 1)) * width;
            // Y축 반전 (SVG는 위가 0)
            const y = height - ((p - min) / range) * height;
            pathD += `${i === 0 ? 'M' : 'L'} ${x} ${y} `;
        });

        const color = isPositive ? 'var(--accent-green)' : 'var(--accent-red)';
        
        return `
            <svg class="sparkline-container" viewBox="0 0 ${width} ${height}">
                <path d="${pathD}" stroke="${color}" />
            </svg>
        `;
    }

    function renderTable(markets) {
        let html = `
            <table class="market-table">
                <thead>
                    <tr>
                        <th>Market</th>
                        <th>Price</th>
                        <th>Trend (Recent)</th>
                        <th>Volume</th>
                        <th>Signal</th>
                    </tr>
                </thead>
                <tbody>
        `;

        markets.forEach(m => {
            const changeClass = m.change_since_start >= 0 ? 'change-pos' : 'change-neg';
            const changeSign = m.change_since_start >= 0 ? '+' : '';
            const isPositive = m.change_since_start >= 0;
            
            // 시그널 태그 로직
            let signalBadge = `<span class="tag tag-wait">Collecting (${m.data_count})</span>`;
            if (m.data_count >= 10) {
                if (Math.abs(m.change_since_start) > 2) {
                    signalBadge = `<span class="tag tag-hot">🔥 High Volatility</span>`;
                } else {
                    signalBadge = `<span class="tag" style="border:1px solid #30363d">Stable</span>`;
                }
            }

            // 미니 차트 생성
            const sparklineSvg = createSparkline(m.sparkline, isPositive);

            html += `
                <tr>
                    <td style="width: 40%;">
                        <div style="font-weight: 600; font-size: 0.95rem; margin-bottom: 4px;">${m.question}</div>
                        <small style="color: var(--text-muted)">ID: ${m.id}</small>
                    </td>
                    <td style="width: 15%;">
                        <div class="price">${(m.current_price * 100).toFixed(1)}¢</div>
                        <small class="${changeClass}">${changeSign}${m.change_since_start}%</small>
                    </td>
                    <td style="width: 15%;">
                        ${sparklineSvg}
                    </td>
                    <td style="width: 15%; color: var(--text-muted);">
                        $${parseInt(m.volume).toLocaleString()}
                    </td>
                    <td style="width: 15%;">
                        ${signalBadge}
                    </td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        document.getElementById('app').innerHTML = html;
    }

    fetchIntelligence();
    // 60초마다 화면 자동 새로고침 (데이터가 10분마다 바뀌므로 자주 할 필요 없음)
    setInterval(fetchIntelligence, 60000);
</script>

</body>
</html>
