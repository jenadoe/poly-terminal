name: 2. Distribute & Commit

on:
  workflow_run:
    workflows: ["1. Calculate & Analyze"]
    types:
      - completed

concurrency:
  group: poly-nexus-commit
  cancel-in-progress: false

jobs:
  distribute:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download Data
        uses: actions/download-artifact@v4
        with:
          name: nexus-data
          path: temp_data
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Private Brain
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.TOKEN1 }}
          path: private-brain

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('private-brain/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Libraries
        run: pip install -r private-brain/requirements.txt

      - name: Push Assets to Private
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRATA_BETA_CODE: ${{ secrets.STRATA_BETA_CODE }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          cd private-brain
          if [ -z "${SUPABASE_SERVICE_KEY:-}" ] && [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            export SUPABASE_SERVICE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
          fi
          if [ -z "${SUPABASE_SERVICE_KEY:-}" ]; then
            echo "SUPABASE_SERVICE_KEY is required for private snapshot RPC reads."
            exit 1
          fi
          if [ -z "${STRATA_BETA_CODE:-}" ]; then
            echo "STRATA_BETA_CODE is required for beta-gated public market parity checks."
            exit 1
          fi
          if [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ]; then
            echo "R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, and R2_SECRET_ACCESS_KEY are required for CL/R2 snapshot publish."
            exit 1
          fi
          if grep -R -n -E '^(<<<<<<<|=======|>>>>>>>)' scripts/publish_cl_r2_public_reference_snapshot_v0.py scripts/verify_public_reference_snapshot_parity_v0.py; then
            echo "Merge conflict marker found in CL/R2 snapshot scripts."
            exit 1
          fi
          python -m py_compile scripts/publish_cl_r2_public_reference_snapshot_v0.py scripts/verify_public_reference_snapshot_parity_v0.py
          git config --global http.postBuffer 524288000
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 300
          mkdir -p data_output/api/v1/events
          mkdir -p data_output/audit_logs
          echo "Copying private data assets..."
          if [ -f ../temp_data/active_events.json ]; then
            cp -f ../temp_data/active_events.json data_output/
          fi
          if [ -d ../temp_data/api ]; then
            rm -rf data_output/api/
            cp -rf ../temp_data/api data_output/
          fi
          if [ -d ../temp_data/audit_logs ]; then
            cp -rf ../temp_data/audit_logs/* data_output/audit_logs/ || true
          fi
          if [ -f ../temp_data/regime_changes.json ]; then
            cp -f ../temp_data/regime_changes.json data_output/
          fi
          if [ -f ../temp_data/completed_ids.json ]; then
            cp -f ../temp_data/completed_ids.json data_output/
          fi
          if [ -d ../temp_data/enterprise_runtime/tight_churn_receipts ] && find ../temp_data/enterprise_runtime/tight_churn_receipts -type f -name '*.json' | grep -q .; then
            mkdir -p data_output/enterprise_runtime/tight_churn_receipts
            cp -rf ../temp_data/enterprise_runtime/tight_churn_receipts/* data_output/enterprise_runtime/tight_churn_receipts/
          fi
          if [ -d case_studies/active ] && find case_studies/active -maxdepth 1 -name '*.md' | grep -q .; then
            echo "Generating Builder Program evidence snapshots..."
            python scripts/build_bp_evidence.py
          else
            echo "No active case studies found. Skipping BP evidence generation."
          fi
          if [ -f scripts/build_proof_archive.py ] && [ -f data_output/active_events.json ]; then
            echo "Building internal proof archive snapshot layer..."
            python scripts/build_proof_archive.py
          else
            echo "Proof archive script or active_events.json missing. Skipping proof archive build."
          fi
          if [ -f scripts/publish_cl_r2_public_reference_snapshot_v0.py ] && [ -f scripts/verify_public_reference_snapshot_parity_v0.py ]; then
            echo "Publishing CL/R2 public reference snapshot..."
            python scripts/publish_cl_r2_public_reference_snapshot_v0.py \
              --limit 50 \
              --public-markets-url "https://www.strata-labs.xyz/api/markets?pipeline_publish=${{ github.run_id }}" \
              --public-markets-beta-code "$STRATA_BETA_CODE" \
              --out-json "../temp_data/cl_r2_public_reference_snapshot_v0.json" \
              --out-md "../temp_data/cl_r2_public_reference_snapshot_v0.md" \
              --publish
            echo "Verifying public reference snapshot parity..."
            python scripts/verify_public_reference_snapshot_parity_v0.py \
              --public-markets-url "https://www.strata-labs.xyz/api/markets?pipeline_verify=${{ github.run_id }}" \
              --public-markets-beta-code "$STRATA_BETA_CODE" \
              --min-rows 40 \
              --max-age-hours 2 \
              --out-json "../temp_data/public_reference_snapshot_parity_v0.json" \
              --out-md "../temp_data/public_reference_snapshot_parity_v0.md"
          else
            echo "CL/R2 public reference snapshot scripts missing. Failing snapshot publish."
            exit 1
          fi
          if [ -f data_output/active_markets.json ]; then rm data_output/active_markets.json; fi
          if [ -f data_output/history_storage.json ]; then rm data_output/history_storage.json; fi
          git config --global user.name "Poly-Nexus Bot"
          git config --global user.email "bot@polynexus.com"
          git add data_output/
          if [ -d bp/evidence ]; then
            git add bp/evidence/
          fi
          if [ -d proof_archive ]; then
            git add proof_archive/
          fi
          if git diff --staged --quiet; then
            echo "No private changes."
          else
            git commit -m "Update Data Assets & Audit [$(date)]"
            git pull --rebase -X theirs origin main
            for attempt in 1 2 3; do
              if git push; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "git push failed after 3 attempts."
                exit 1
              fi
              echo "git push failed; retrying in $((attempt * 15)) seconds..."
              sleep $((attempt * 15))
            done
          fi

      - name: Checkout Public Face
        uses: actions/checkout@v4
        with:
          path: public-face

      - name: Audit Public Reference Surface
        env:
          STRATA_BETA_CODE: ${{ secrets.STRATA_BETA_CODE }}
        run: |
          cd public-face
          node scripts/audit-public-reference-surface.mjs
          if [ -z "${STRATA_BETA_CODE:-}" ]; then
            echo "STRATA_BETA_CODE is required for beta-gated reference surface audit."
            exit 1
          fi
          node scripts/audit-public-reference-surface.mjs \
            --url=https://www.strata-labs.xyz/api/markets \
            --beta-code "$STRATA_BETA_CODE"

      - name: Push Public Dashboard Only
        run: |
          cd public-face

          git config --global user.name "Poly-Nexus Bot"
          git config --global user.email "bot@polynexus.com"

          git add docs/

          if git diff --staged --quiet; then
            echo "No public changes."
          else
            git commit -m "Harden public dashboard delivery [$(date)]"
            git pull --rebase -X theirs origin main
            git push
          fi
