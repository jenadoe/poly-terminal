name: 1. Calculate & Analyze

on:
  repository_dispatch:
    types: [poly-nexus-run]  # Cloudflare Workers가 보내는 신호
  workflow_dispatch:  # 수동 실행도 유지

# ── [C-1 FIX] 동시 실행 방지 ─────────────────────────────────────
# cancel-in-progress: false → 현재 실행 중인 job은 끝까지 완료 보장
# 새 트리거는 현재 job이 끝날 때까지 큐에서 대기
# 주의: 두 workflow가 동일한 group명을 써야 파이프라인 전체가 직렬화됨
concurrency:
  group: poly-nexus-pipeline
  cancel-in-progress: false
# ─────────────────────────────────────────────────────────────────

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Private Brain
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.TOKEN1 }}
          path: private-brain

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r private-brain/requirements.txt

      - name: Run Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          cd private-brain
          python main.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: nexus-data
          path: private-brain/data_output/
          retention-days: 1